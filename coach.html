<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璁粌鎶ュ憡璇︽儏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 24px; }
  .page-title h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .page-title p { font-size: 12px; color: #888; margin-top: 4px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .report-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
  .card-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 24px 28px 20px; }
  .session-tag { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-bottom: 10px; }
  .student-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .session-meta { font-size: 13px; opacity: 0.75; display: flex; gap: 20px; flex-wrap: wrap; }
  .section { padding: 20px 28px; border-bottom: 1px solid #f0f0f0; }
  .section:last-child { border-bottom: none; }
  .section-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; }
  .training-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .training-table thead th { background: #f8f9fc; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; font-size: 12px; border-bottom: 2px solid #e8eaf0; }
  .training-table tbody tr { border-bottom: 1px solid #f0f0f0; }
  .training-table tbody td { padding: 11px 12px; color: #333; }
  .module-tag { display: inline-block; background: #e8eaf0; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #555; font-weight: 600; }
  .done-badge { display: inline-block; background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric-item { background: #f8f9fc; border-radius: 12px; padding: 14px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .metric-unit { font-size: 12px; color: #888; font-weight: 400; }
  .metric-value.highlight { color: #4f46e5; }
  .comment-box { background: #f8f9fc; border-radius: 12px; padding: 16px; }
  .comment-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .comment-row:last-child { margin-bottom: 0; }
  .comment-label { font-size: 12px; font-weight: 600; color: #555; min-width: 70px; }
  .comment-text { font-size: 13px; color: #333; flex: 1; }
  .next-session { background: linear-gradient(135deg, #f0f4ff 0%, #e8eaf0 100%); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .next-info .next-date { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .next-info .next-focus { font-size: 13px; color: #555; margin-top: 2px; }
  .next-btn { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .coach-note { background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 14px; color: #92400e; line-height: 1.6; }
  .card-footer { padding: 16px 28px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
  .coach-info { font-size: 12px; color: #888; }
  .coach-info strong { color: #555; }
  .action-btns { display: flex; gap: 10px; }
  .action-btns button { border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-share { background: #4f46e5; color: #fff; }
  .btn-edit { background: #fff; color: #4f46e5; border: 1.5px solid #4f46e5; }
  .btn-delete { background: #fff; color: #dc2626; border: 1.5px solid #dc2626; }
  .loading { text-align: center; padding: 60px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">鈫?杩斿洖鍒楄〃</div>
  <div id="report-content"><div class="loading">姝ｅ湪鍔犺浇...</div></div>

<script>
var SB_URL = '__SUPABASE_URL__';
var SB_KEY = '__SUPABASE_ANON_KEY__';

function getReportId() { return new URLSearchParams(window.location.search).get('id'); }
function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderReport(r) {
  var data = r.report_data || {};
  var exercises = data.exercises || [];
  var metrics = data.metrics || {};
  var comments = data.comments || {};
  var nextSession = data.next_session || {};
  var exHtml = exercises.map(function(ex){
    return '<tr><td><span class="module-tag">'+esc(ex.module)+'</span></td><td>'+esc(ex.name)+'</td><td>'+esc(ex.sets)+'</td><td>'+esc(ex.weight)+'</td><td><span class="done-badge">鉁?/span></td></tr>';
  }).join('');
  document.getElementById('report-content').innerHTML = [
    '<div class="report-card">',
      '<div class="card-header">',
        '<div class="session-tag">绗?+(r.session_number||1)+' 璇?/div>',
        '<div class="student-name">'+esc(r.student_name)+'</div>',
        '<div class="session-meta">',
          '<span>馃搮 '+(r.session_date||'-')+'</span>',
          '<span>鈴?'+(r.duration||60)+'鍒嗛挓</span>',
          '<span>馃搷 '+(r.location||'鍋ヨ韩鎴?)+'</span>',
          '<span>馃幆 '+(r.goal||'-')+'</span>',
        '</div>',
      '</div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>璁粌鍐呭</div>',
        '<table class="training-table"><thead><tr><th>妯″潡</th><th>鍔ㄤ綔</th><th>缁勬暟/鏃堕棿</th><th>閲嶉噺</th><th>瀹屾垚</th></tr></thead><tbody>'+exHtml+'</tbody></table>',
      '</div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>浣撴祴鏁版嵁</div><div class="metrics-grid">',
        '<div class="metric-item"><div class="metric-label">浣撻噸</div><div class="metric-value">'+esc(metrics.weight||'-')+' <span class="metric-unit">kg</span></div></div>',
        '<div class="metric-item"><div class="metric-label">浣撹剛鐜?/div><div class="metric-value">'+esc(metrics.bodyfat||'-')+' <span class="metric-unit">%</span></div></div>',
        '<div class="metric-item"><div class="metric-label">鏈€澶ч噸閲?/div><div class="metric-value highlight">'+esc(metrics.max_weight||'-')+' <span class="metric-unit">kg</span></div></div>',
        '<div class="metric-item"><div class="metric-label">鏈夋哀鏃堕暱</div><div class="metric-value">'+esc(metrics.cardio_time||'-')+' <span class="metric-unit">min</span></div></div>',
        '<div class="metric-item"><div class="metric-label">鍔ㄤ綔璇勫垎</div><div class="metric-value highlight">'+esc(metrics.action_score||'-')+' <span class="metric-unit">鍒?/span></div></div>',
        '<div class="metric-item"><div class="metric-label">鐘舵€佽瘎鍒?/div><div class="metric-value highlight">'+esc(metrics.status_score||'-')+' <span class="metric-unit">鍒?/span></div></div>',
      '</div></div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>鏁欑粌璇勪环</div><div class="comment-box">',
        '<div class="comment-row"><div class="comment-label">浜偣</div><div class="comment-text">'+esc(comments.highlight||'鏃?)+'</div></div>',
        '<div class="comment-row"><div class="comment-label">寰呮敼杩?/div><div class="comment-text">'+esc(comments.improve||'鏃?)+'</div></div>',
        '<div class="comment-row"><div class="comment-label">鍏抽敭鎻愮ず</div><div class="comment-text">'+esc(comments.tip||'鏃?)+'</div></div>',
        '<div class="comment-row"><div class="comment-label">钀ュ吇寤鸿</div><div class="comment-text">'+esc(comments.nutrition||'鏃?)+'</div></div>',
      '</div></div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>涓嬭妭璁″垝</div>',
        '<div class="next-session"><div class="next-info"><div class="next-date">馃搮 '+(nextSession.date||'寰呭畾')+'</div><div class="next-focus">馃幆 '+(nextSession.focus||'涓嬭妭閲嶇偣锛氱患鍚堣缁?)+'</div></div><button class="next-btn">宸查绾?鉁?/button></div>',
      '</div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>鏁欑粌鐣欒█</div>',
        '<div class="coach-note">馃摑 '+(comments.coach_note||'缁х画鍔犳补锛屼綘杩涙寰堝揩锛佹寜杩欎釜鑺傚涓嬪幓锛屼笅娆′綋鑳芥暟鎹竴瀹氫細鏇村ソ銆傪煉?)+'</div>',
      '</div>',
      '<div class="card-footer">',
        '<div class="coach-info">鏁欑粌锛?strong>'+esc(r.coach_name||'鏁欑粌')+'</strong> 路 '+(r.session_date||'')+'</div>',
        '<div class="action-btns">',
          '<button class="btn-delete" id="del-btn">馃棏 鍒犻櫎</button>',
          '<button class="btn-edit" id="edit-btn">鉁忥笍 淇敼</button>',
          '<button class="btn-share" id="share-btn">馃摛 鍙戦€佺粰瀛﹀憳</button>',
        '</div>',
      '</div>',
    '</div>'
  ].join('');

  document.getElementById('del-btn').addEventListener('click', function(){ deleteReport(r.id); });
  document.getElementById('edit-btn').addEventListener('click', function(){ location.href='create.html?id='+r.id; });
  document.getElementById('share-btn').addEventListener('click', function(){ sendReport(r.id); });
}

async function supabaseFetch(method, path, body) {
  var opts = {
    method: method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      ' Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (method === 'DELETE' || method === 'PATCH') return { error: r.ok ? null : await r.text() };
  var data = await r.json();
  if (!r.ok) return { error: data.message || r.status, data: null };
  return { data: data };
}

async function deleteReport(id) {
  if (!confirm('纭畾鍒犻櫎杩欎唤鎶ュ憡鍚楋紵')) return;
  var result = await supabaseFetch('DELETE', 'reports?id=eq.' + id);
  if (result.error) alert('鍒犻櫎澶辫触: '+result.error);
  else location.href = 'index.html';
}

async function sendReport(id) {
  var result = await supabaseFetch('PATCH', 'reports?id=eq.' + id, { status: 'done' });
  if (result.error) alert('鍙戦€佸け璐? '+result.error);
  else { alert('宸插彂閫佺粰瀛﹀憳锛?); location.reload(); }
}

async function loadReport() {
  var id = getReportId();
  if (!id) { document.getElementById('report-content').innerHTML = '<div class="loading">缂哄皯鎶ュ憡ID</div>'; return; }
  if (!SB_URL) { document.getElementById('report-content').innerHTML = '<div class="loading">鈿狅笍 Supabase 鏈厤缃?/div>'; return; }
  var result = await supabaseFetch('GET', 'reports?id=eq.' + id + '&select=*');
  if (result.error || !result.data || !result.data.length) {
    document.getElementById('report-content').innerHTML = '<div class="loading">鎶ュ憡涓嶅瓨鍦ㄦ垨鍔犺浇澶辫触</div>'; return;
  }
  renderReport(result.data[0]);
}
loadReport();
</script>
</body>
</html>
