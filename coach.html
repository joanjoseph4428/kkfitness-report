<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Detail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .report-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
  .card-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 24px 28px 20px; }
  .session-tag { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-bottom: 10px; }
  .student-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .session-meta { font-size: 13px; opacity: 0.75; display: flex; gap: 20px; flex-wrap: wrap; }
  .section { padding: 20px 28px; border-bottom: 1px solid #f0f0f0; }
  .section:last-child { border-bottom: none; }
  .section-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; }
  .training-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .training-table thead th { background: #f8f9fc; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; font-size: 12px; border-bottom: 2px solid #e8eaf0; }
  .training-table tbody tr { border-bottom: 1px solid #f0f0f0; }
  .training-table tbody td { padding: 11px 12px; color: #333; }
  .module-tag { display: inline-block; background: #e8eaf0; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #555; font-weight: 600; }
  .done-badge { display: inline-block; background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric-item { background: #f8f9fc; border-radius: 12px; padding: 14px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .metric-unit { font-size: 12px; color: #888; font-weight: 400; }
  .metric-value.highlight { color: #4f46e5; }
  .comment-box { background: #f8f9fc; border-radius: 12px; padding: 16px; }
  .comment-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .comment-row:last-child { margin-bottom: 0; }
  .comment-label { font-size: 12px; font-weight: 600; color: #555; min-width: 70px; }
  .comment-text { font-size: 13px; color: #333; flex: 1; }
  .next-session { background: linear-gradient(135deg, #f0f4ff 0%, #e8eaf0 100%); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .next-btn { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .coach-note { background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 14px; color: #92400e; line-height: 1.6; }
  .card-footer { padding: 16px 28px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
  .coach-info { font-size: 12px; color: #888; }
  .coach-info strong { color: #555; }
  .action-btns { display: flex; gap: 10px; }
  .action-btns button { border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-share { background: #4f46e5; color: #fff; }
  .btn-edit { background: #fff; color: #4f46e5; border: 1.5px solid #4f46e5; }
  .btn-delete { background: #fff; color: #dc2626; border: 1.5px solid #dc2626; }
  .loading { text-align: center; padding: 60px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">Back to List</div>
  <div id="report-content"><div class="loading">Loading...</div></div>
</div>

<script>
var MASTER_KEY = '$2a$10$xtOHk9uH7fTP9zDGqQ5FhObZPimIVOe39.U7RjutviV5cNeytzgbi';

function getBinUrl() { return 'https://api.jsonbin.io/v2/b/' + localStorage.getItem('kkfitness_bin_id'); }

function getReportId() { return new URLSearchParams(window.location.search).get('id'); }
function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function jsonbinFetch(method, path, body) {
  var binUrl = getBinUrl();
  var opts = {
    method: method,
    headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(binUrl + path, opts);
  var text = await r.text();
  var data;
  try { data = JSON.parse(text); } catch(e) { data = text; }
  if (!r.ok) return { error: r.status, data: null };
  return { data: data };
}

async function getReports() {
  var result = await jsonbinFetch('GET', '');
  if (result.error) return [];
  return result.data && result.data.reports ? result.data.reports : [];
}

async function saveReports(reports) {
  var r = await fetch(getBinUrl(), {
    method: 'PUT',
    headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ reports: reports })
  });
  return r.ok;
}

function renderReport(r) {
  var data = r.report_data || {};
  var exercises = data.exercises || [];
  var metrics = data.metrics || {};
  var comments = data.comments || {};
  var nextSession = data.next_session || {};
  var exHtml = exercises.map(function(ex){
    return '<tr><td><span class="module-tag">'+esc(ex.module)+'</span></td><td>'+esc(ex.name)+'</td><td>'+esc(ex.sets)+'</td><td>'+esc(ex.weight)+'</td><td><span class="done-badge">OK</span></td></tr>';
  }).join('');
  document.title = esc(r.student_name) + ' - Report';
  document.getElementById('report-content').innerHTML = [
    '<div class="report-card">',
      '<div class="card-header">',
        '<div class="session-tag">Session '+(r.session_number||1)+'</div>',
        '<div class="student-name">'+esc(r.student_name)+'</div>',
        '<div class="session-meta">',
          '<span>'+(r.session_date||'-')+'</span>',
          '<span>'+(r.duration||60)+'min</span>',
          '<span>'+(r.goal||'-')+'</span>',
        '</div>',
      '</div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>Training Content</div>',
        '<table class="training-table"><thead><tr><th>Module</th><th>Exercise</th><th>Sets/Time</th><th>Weight</th><th>Done</th></tr></thead><tbody>'+exHtml+'</tbody></table>',
      '</div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>Metrics</div><div class="metrics-grid">',
        '<div class="metric-item"><div class="metric-label">Weight</div><div class="metric-value">'+esc(metrics.weight||'-')+' <span class="metric-unit">kg</span></div></div>',
        '<div class="metric-item"><div class="metric-label">Body Fat</div><div class="metric-value">'+esc(metrics.bodyfat||'-')+' <span class="metric-unit">%</span></div></div>',
        '<div class="metric-item"><div class="metric-label">Max Weight</div><div class="metric-value highlight">'+esc(metrics.max_weight||'-')+' <span class="metric-unit">kg</span></div></div>',
        '<div class="metric-item"><div class="metric-label">Cardio Time</div><div class="metric-value">'+esc(metrics.cardio_time||'-')+' <span class="metric-unit">min</span></div></div>',
        '<div class="metric-item"><div class="metric-label">Action Score</div><div class="metric-value highlight">'+esc(metrics.action_score||'-')+'</div></div>',
        '<div class="metric-item"><div class="metric-label">Status Score</div><div class="metric-value highlight">'+esc(metrics.status_score||'-')+'</div></div>',
      '</div></div>',
      '<div class="section"><div class="section-title"><span class="dot"></span>Feedback</div><div class="comment-box">',
        '<div class="comment-row"><div class="comment-label">Highlight</div><div class="comment-text">'+esc(comments.highlight||'None')+'</div></div>',
        '<div class="comment-row"><div class="comment-label">Improve</div><div class="comment-text">'+esc(comments.improve||'None')+'</div></div>',
        '<div class="comment-row"><div class="comment-label">Tip</div><div class="comment-text">'+esc(comments.tip||'None')+'</div></div>',
        '<div class="comment-row"><div class="comment-label">Nutrition</div><div class="comment-text">'+esc(comments.nutrition||'None')+'</div></div>',
      '</div></div>',
      nextSession.date ? '<div class="section"><div class="section-title"><span class="dot"></span>Next Session</div><div class="next-session"><div class="next-info"><div class="next-date">'+esc(nextSession.date)+'</div><div class="next-focus">'+esc(nextSession.focus||'General')+'</div></div><button class="next-btn">Booked</button></div></div>' : '',
      '<div class="section"><div class="section-title"><span class="dot"></span>Coach Note</div>',
        '<div class="coach-note">'+esc(comments.coach_note||'Keep it up!')+'</div>',
      '</div>',
      '<div class="card-footer">',
        '<div class="coach-info">Coach: <strong>'+esc(r.coach_name||'Coach')+'</strong></div>',
        '<div class="action-btns">',
          '<button class="btn-delete" id="del-btn">Delete</button>',
          '<button class="btn-edit" id="edit-btn">Edit</button>',
          '<button class="btn-share" id="share-btn">Share</button>',
        '</div>',
      '</div>',
    '</div>'
  ].join('');

  document.getElementById('del-btn').addEventListener('click', function(){ deleteReport(r.id); });
  document.getElementById('edit-btn').addEventListener('click', function(){ location.href='create.html?id='+r.id; });
  document.getElementById('share-btn').addEventListener('click', function(){ shareReport(r.id); });
}

async function deleteReport(id) {
  if (!confirm('Delete this report?')) return;
  var reports = await getReports();
  var filtered = reports.filter(function(r){ return r.id !== id; });
  var ok = await saveReports(filtered);
  if (ok) location.href = 'index.html';
  else alert('Delete failed');
}

async function shareReport(id) {
  var reports = await getReports();
  var r = reports.find(function(r){ return r.id === id; });
  if (!r) return;
  r.status = 'done';
  await saveReports(reports);
  var shareUrl = location.origin + '/view.html?id=' + id;
  try {
    navigator.clipboard.writeText(shareUrl);
    var btn = document.getElementById('share-btn');
    btn.textContent = 'Link Copied!';
    btn.style.background = '#059669';
  } catch(e) {
    alert('Sent! Share: ' + shareUrl);
  }
}

async function loadReport() {
  var id = getReportId();
  if (!id) { document.getElementById('report-content').innerHTML = '<div class="loading">Missing ID</div>'; return; }
  var reports = await getReports();
  var r = reports.find(function(r){ return r.id == id; });
  if (!r) { document.getElementById('report-content').innerHTML = '<div class="loading">Report not found</div>'; return; }
  renderReport(r);
}
loadReport();
</script>
</body>
</html>
