<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练报告详情</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 24px; }
  .page-title h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .page-title p { font-size: 12px; color: #888; margin-top: 4px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .report-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
  .card-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 24px 28px 20px; }
  .session-tag { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-bottom: 10px; }
  .student-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .session-meta { font-size: 13px; opacity: 0.75; display: flex; gap: 20px; flex-wrap: wrap; }
  .section { padding: 20px 28px; border-bottom: 1px solid #f0f0f0; }
  .section:last-child { border-bottom: none; }
  .section-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; }
  .training-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .training-table thead th { background: #f8f9fc; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; font-size: 12px; border-bottom: 2px solid #e8eaf0; }
  .training-table tbody tr { border-bottom: 1px solid #f0f0f0; }
  .training-table tbody td { padding: 11px 12px; color: #333; }
  .module-tag { display: inline-block; background: #e8eaf0; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #555; font-weight: 600; }
  .done-badge { display: inline-block; background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric-item { background: #f8f9fc; border-radius: 12px; padding: 14px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .metric-unit { font-size: 12px; color: #888; font-weight: 400; }
  .metric-value.highlight { color: #4f46e5; }
  .comment-box { background: #f8f9fc; border-radius: 12px; padding: 16px; }
  .comment-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .comment-row:last-child { margin-bottom: 0; }
  .comment-label { font-size: 12px; font-weight: 600; color: #555; min-width: 70px; }
  .comment-text { font-size: 13px; color: #333; flex: 1; }
  .next-session { background: linear-gradient(135deg, #f0f4ff 0%, #e8eaf0 100%); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .next-info .next-date { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .next-info .next-focus { font-size: 13px; color: #555; margin-top: 2px; }
  .next-btn { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .coach-note { background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 14px; color: #92400e; line-height: 1.6; }
  .card-footer { padding: 16px 28px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
  .coach-info { font-size: 12px; color: #888; }
  .coach-info strong { color: #555; }
  .action-btns { display: flex; gap: 10px; }
  .action-btns button { border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-share { background: #4f46e5; color: #fff; }
  .btn-edit { background: #fff; color: #4f46e5; border: 1.5px solid #4f46e5; }
  .btn-delete { background: #fff; color: #dc2626; border: 1.5px solid #dc2626; }
  .loading { text-align: center; padding: 60px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">← 返回列表</div>
  <div id="report-content">
    <div class="loading">正在加载...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';
const supabase = SUPABASE_URL !== '__SUPABASE_URL__' ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

function getReportId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function renderReport(r) {
  const data = r.report_data || {};
  const exercises = data.exercises || [];
  const metrics = data.metrics || {};
  const comments = data.comments || {};
  const nextSession = data.next_session || {};

  document.getElementById('report-content').innerHTML = `
    <div class="report-card">
      <div class="card-header">
        <div class="session-tag">第 ${r.session_number || 1} 次课</div>
        <div class="student-name">${r.student_name || '学员'}</div>
        <div class="session-meta">
          <span>📅 ${r.session_date || '-'}</span>
          <span>⏱ ${r.duration || 60}分钟</span>
          <span>📍 ${r.location || '器械区'}</span>
          <span>🎯 ${r.goal || '-'}</span>
        </div>
      </div>
      <div class="section">
        <div class="section-title"><span class="dot"></span>训练内容</div>
        <table class="training-table">
          <thead>
            <tr><th>模块</th><th>动作</th><th>组数/时长</th><th>重量</th><th>完成</th></tr>
          </thead>
          <tbody>
            ${exercises.map(ex => `
              <tr>
                <td><span class="module-tag">${ex.module || '-'}</span></td>
                <td>${ex.name || '-'}</td>
                <td>${ex.sets || '-'}</td>
                <td>${ex.weight || '-'}</td>
                <td><span class="done-badge">✓</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="section">
        <div class="section-title"><span class="dot"></span>本次体测数据</div>
        <div class="metrics-grid">
          <div class="metric-item"><div class="metric-label">体重</div><div class="metric-value">${metrics.weight || '-'} <span class="metric-unit">kg</span></div></div>
          <div class="metric-item"><div class="metric-label">体脂率</div><div class="metric-value">${metrics.bodyfat || '-'} <span class="metric-unit">%</span></div></div>
          <div class="metric-item"><div class="metric-label">最大重量</div><div class="metric-value highlight">${metrics.max_weight || '-'} <span class="metric-unit">kg</span></div></div>
          <div class="metric-item"><div class="metric-label">有氧时长</div><div class="metric-value">${metrics.cardio_time || '-'} <span class="metric-unit">min</span></div></div>
          <div class="metric-item"><div class="metric-label">动作评分</div><div class="metric-value highlight">${metrics.action_score || '-'} <span class="metric-unit">分</span></div></div>
          <div class="metric-item"><div class="metric-label">状态评分</div><div class="metric-value highlight">${metrics.status_score || '-'} <span class="metric-unit">分</span></div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title"><span class="dot"></span>教练评语</div>
        <div class="comment-box">
          <div class="comment-row"><div class="comment-label">亮点</div><div class="comment-text">${comments.highlight || '暂无'}</div></div>
          <div class="comment-row"><div class="comment-label">待提升</div><div class="comment-text">${comments.improve || '暂无'}</div></div>
          <div class="comment-row"><div class="comment-label">关键提示</div><div class="comment-text">${comments.tip || '暂无'}</div></div>
          <div class="comment-row"><div class="comment-label">营养建议</div><div class="comment-text">${comments.nutrition || '暂无'}</div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title"><span class="dot"></span>下节计划</div>
        <div class="next-session">
          <div class="next-info">
            <div class="next-date">📅 ${nextSession.date || '待定'}</div>
            <div class="next-focus">🎯 ${nextSession.focus || '下次重点：全身综合训练'}</div>
          </div>
          <button class="next-btn">已预约 ✓</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title"><span class="dot"></span>教练留言</div>
        <div class="coach-note">💬 ${comments.coach_note || '继续加油！'}</div>
      </div>
      <div class="card-footer">
        <div class="coach-info">教练：<strong>${r.coach_name || '教练'}</strong> · ${r.session_date || '-'}</div>
        <div class="action-btns">
          <button class="btn-delete" onclick="deleteReport('${r.id}')">🗑 删除</button>
          <button class="btn-edit" onclick="location.href='create.html?id=${r.id}'">✏️ 修改</button>
          <button class="btn-share" onclick="sendReport('${r.id}')">📤 发送给学员</button>
        </div>
      </div>
    </div>
  `;
}

async function deleteReport(id) {
  if (!confirm('确定删除这份报告？')) return;
  const { error } = await supabase.from('reports').delete().eq('id', id);
  if (error) alert('删除失败: ' + error.message);
  else location.href = 'index.html';
}

async function sendReport(id) {
  const { error } = await supabase.from('reports').update({ status: 'done' }).eq('id', id);
  if (error) alert('发送失败: ' + error.message);
  else { alert('已发送给学员！'); location.reload(); }
}

async function loadReport() {
  const id = getReportId();
  if (!id) { document.getElementById('report-content').innerHTML = '<div class="loading">缺少报告ID</div>'; return; }
  if (!supabase) { document.getElementById('report-content').innerHTML = '<div class="loading">⚠️ Supabase 未配置</div>'; return; }
  const { data, error } = await supabase.from('reports').select('*').eq('id', id).single();
  if (error || !data) { document.getElementById('report-content').innerHTML = '<div class="loading">报告不存在或加载失败</div>'; return; }
  renderReport(data);
}
loadReport();
</script>
</body>
</html>
