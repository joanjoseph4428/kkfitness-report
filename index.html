<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>и®ӯз»ғжҠҘе‘Ҡ - йҰ–йЎө</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 32px; }
  .page-title h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
  .page-title p { font-size: 13px; color: #888; margin-top: 6px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab { padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; border: none; background: #fff; color: #666; }
  .tab.active { background: #4f46e5; color: #fff; }
  .report-list { display: flex; flex-direction: column; gap: 16px; }
  .report-card { background: #fff; border-radius: 16px; padding: 20px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: box-shadow 0.2s; }
  .report-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .report-info .student { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .report-info .meta { font-size: 12px; color: #888; display: flex; gap: 16px; }
  .report-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
  .add-btn { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: #4f46e5; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(79,70,229,0.4); }
</style>
</head>
<body>
<div class="container">
  <div class="page-title">
    <h1>рҹҸӢпёҸвҖҚвҷӮпёҸ еҒҘиә«и®ӯз»ғжҠҘе‘Ҡзі»з»ҹ</h1>
    <p id="coach-name">ж•ҷз»ғз«Ҝ В· еҠ иҪҪдёӯ...</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('all')">е…ЁйғЁжҠҘе‘Ҡ</button>
    <button class="tab" onclick="showTab('done')">е·Іе®ҢжҲҗ</button>
    <button class="tab" onclick="showTab('pending')">еҫ…е®ҢжҲҗ</button>
  </div>
  <div id="report-list" class="report-list">
    <div class="empty">жӯЈеңЁеҠ иҪҪи®ӯз»ғжҠҘе‘Ҡ...</div>
  </div>
</div>
<button class="add-btn" onclick="location.href='create.html'">+</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB_URL = '__SUPABASE_URL__';
var SB_KEY = '__SUPABASE_ANON_KEY__';
var sb = (SB_URL !== '__SUPABASE_URL__' && typeof createClient !== 'undefined') ? createClient(SB_URL, SB_KEY) : null;

async function loadReports(filter) {
  filter = filter || 'all';
  var list = document.getElementById('report-list');
  if (!sb) { list.innerHTML = '<div class="empty">вҡ пёҸ Supabase жңӘй…ҚзҪ®пјҢиҜ·жЈҖжҹҘзҺҜеўғеҸҳйҮҸ</div>'; return; }
  var allData = [];
  try {
    var result = await sb.from('reports').select('*').order('created_at', { ascending: false });
    if (result.error) throw result.error;
    allData = result.data || [];
  } catch(e) {
    list.innerHTML = '<div class="empty">еҠ иҪҪеӨұиҙҘ: ' + (e.message || e) + '</div>'; return;
  }
  if (!allData.length) { list.innerHTML = '<div class="empty">жҡӮж— и®ӯз»ғжҠҘе‘ҠпјҢзӮ№еҮ» + еҲӣе»әз¬¬дёҖдёӘ</div>'; return; }
  var filtered = filter === 'all' ? allData : allData.filter(function(r){ return filter === 'done' ? r.status === 'done' : r.status !== 'done'; });
  list.innerHTML = filtered.map(function(r) {
    return '<div class="report-card" onclick="location.href=\'coach.html?id=' + r.id + '\'">' +
      '<div class="report-info"><div class="student">' + (r.student_name||'жңӘе‘ҪеҗҚ') + '</div>' +
      '<div class="meta"><span>рҹ“… ' + (r.session_date||'-') + '</span><span>вҸұ ' + (r.duration||60) + 'еҲҶй’ҹ</span><span>рҹҺҜ ' + (r.goal||'-') + '</span></div></div>' +
      '<span class="report-badge ' + (r.status==='done'?'badge-done':'badge-pending') + '">' + (r.status==='done'?'вң“ е·ІеҸ‘':'вҸі еҫ…еҸ‘') + '</span></div>';
  }).join('');
}

function showTab(filter) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  event.target.classList.add('active');
  loadReports(filter);
}

async function init() {
  if (sb) {
    try {
      var sess = await sb.auth.getSession();
      if (sess.data.session) document.getElementById('coach-name').textContent = 'ж•ҷз»ғз«Ҝ В· ' + sess.data.session.user.email;
    } catch(e){}
  }
  loadReports('all');
}
init();
</script>
</body>
</html>
