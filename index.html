<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璁粌鎶ュ憡 - 棣栭〉</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 32px; }
  .page-title h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
  .page-title p { font-size: 13px; color: #888; margin-top: 6px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab { padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; border: none; background: #fff; color: #666; }
  .tab.active { background: #4f46e5; color: #fff; }
  .report-list { display: flex; flex-direction: column; gap: 16px; }
  .report-card { background: #fff; border-radius: 16px; padding: 20px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: box-shadow 0.2s; }
  .report-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .report-info .student { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .report-info .meta { font-size: 12px; color: #888; display: flex; gap: 16px; }
  .report-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
  .add-btn { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: #4f46e5; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(79,70,229,0.4); }
</style>
</head>
<body>
<div class="container">
  <div class="page-title">
    <h1>馃弸锔忊€嶁檪锔?鍋ヨ韩璁粌鎶ュ憡绯荤粺</h1>
    <p id="coach-name">鏁欑粌绔?路 鍔犺浇涓?..</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('all')">鍏ㄩ儴鎶ュ憡</button>
    <button class="tab" onclick="showTab('done')">宸插畬鎴?/button>
    <button class="tab" onclick="showTab('pending')">寰呭畬鎴?/button>
  </div>
  <div id="report-list" class="report-list">
    <div class="empty">姝ｅ湪鍔犺浇璁粌鎶ュ憡...</div>
  </div>
</div>
<button class="add-btn" onclick="location.href='create.html'">+</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var __SUPABASE_URL__ = 'https://tjdrzjucvwebclsfvgrr.supabase.co';
var __SUPABASE_ANON_KEY__ = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqZHJ6anVjdndlYmNsc2Z2Z3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODc0MDUsImV4cCI6MjA5MDE2MzQwNX0.74kAxC0LhBLHY-k-FI90MFvpGp_I3E5uLH1KNP6QRWc';
var supabase = null;
if (typeof window.Supabase !== 'undefined') {
  supabase = window.Supabase.createClient(__SUPABASE_URL__, __SUPABASE_ANON_KEY__);
}

async function loadReports(filter) {
  var list = document.getElementById('report-list');
  if (!supabase) { list.innerHTML = '<div class="empty">鈿狅笍 Supabase 鏈厤缃?/div>'; return; }
  var result = await supabase.from('reports').select('*').order('created_at', { ascending: false });
  if (result.error) { list.innerHTML = '<div class="empty">鍔犺浇澶辫触</div>'; return; }
  var data = result.data || [];
  if (data.length === 0) { list.innerHTML = '<div class="empty">鏆傛棤璁粌鎶ュ憡</div>'; return; }
  var filtered = filter === 'all' ? data : data.filter(function(r) { return filter === 'done' ? r.status === 'done' : r.status !== 'done'; });
  list.innerHTML = filtered.map(function(r) {
    return '<div class="report-card" onclick="location.href=\'coach.html?id=' + r.id + '\'">' +
      '<div class="report-info"><div class="student">' + (r.student_name || '鏈煡') + '</div>' +
      '<div class="meta"><span>馃搮 ' + (r.session_date || '-') + '</span><span>鈴?' + (r.duration || 60) + '鍒嗛挓</span><span>馃幆 ' + (r.goal || '-') + '</span></div></div>' +
      '<span class="report-badge ' + (r.status === 'done' ? 'badge-done' : 'badge-pending') + '">' + (r.status === 'done' ? '鉁?宸插彂' : '鈴?寰呭彂') + '</span></div>';
  }).join('');
}

function showTab(filter) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  loadReports(filter);
}

async function init() {
  loadReports('all');
}
init();
</script>
</body>
</html>
