<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Report - Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 32px; }
  .page-title h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
  .page-title p { font-size: 13px; color: #888; margin-top: 6px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab { padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; border: none; background: #fff; color: #666; }
  .tab.active { background: #4f46e5; color: #fff; }
  .report-list { display: flex; flex-direction: column; gap: 16px; }
  .report-card { background: #fff; border-radius: 16px; padding: 20px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: box-shadow 0.2s; }
  .report-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .report-info .student { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .report-info .meta { font-size: 12px; color: #888; display: flex; gap: 16px; }
  .report-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
  .add-btn { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: #4f46e5; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(79,70,229,0.4); }
</style>
</head>
<body>
<div class="container">
  <div class="page-title">
    <h1>Gym Training Report System</h1>
    <p id="coach-name">Coach Dashboard</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('all')">All</button>
    <button class="tab" onclick="showTab('done')">Done</button>
    <button class="tab" onclick="showTab('pending')">Pending</button>
  </div>
  <div id="report-list" class="report-list">
    <div class="empty">Loading reports...</div>
  </div>
</div>
<button class="add-btn" onclick="location.href='create.html'">+</button>

<script>
var MASTER_KEY = '$2a$10$xtOHk9uH7fTP9zDGqQ5FhObZPimIVOe39.U7RjutviV5cNeytzgbi';
var BIN_ID = localStorage.getItem('kkfitness_bin_id');
var BIN_URL = 'https://api.jsonbin.io/v2/b/' + BIN_ID;

function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function jsonbinFetch(method, path, body, nobin) {
  if (!BIN_ID && nobin) return { data: [], error: null };
  var opts = {
    method: method,
    headers: {
      'X-Master-Key': MASTER_KEY,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(BIN_URL + path, opts);
  if (r.status === 404) return { data: [], error: null, notFound: true };
  var text = await r.text();
  var data;
  try { data = JSON.parse(text); } catch(e) { data = text; }
  if (!r.ok) return { error: r.status + ': ' + text, data: null };
  return { data: data };
}

async function ensureBin() {
  if (BIN_ID) return;
  var r = await fetch('https://api.jsonbin.io/v2/b', {
    method: 'POST',
    headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ reports: [] })
  });
  var data = await r.json();
  BIN_ID = data.metadata.id;
  localStorage.setItem('kkfitness_bin_id', BIN_ID);
  BIN_URL = 'https://api.jsonbin.io/v2/b/' + BIN_ID;
}

async function loadReports(filter) {
  filter = filter || 'all';
  var list = document.getElementById('report-list');
  list.innerHTML = '<div class="empty">Loading...</div>';
  await ensureBin();
  var result = await jsonbinFetch('GET', '');
  if (result.error) { list.innerHTML = '<div class="empty">Error: ' + result.error + '</div>'; return; }
  var allData = result.data && result.data.reports ? result.data.reports : [];
  allData.sort(function(a,b){ return (b.created_at||'') - (a.created_at||''); });
  if (!allData.length) {
    list.innerHTML = '<div class="empty">No reports yet. Click + to create one.</div>';
    return;
  }
  var filtered = filter === 'all' ? allData : allData.filter(function(r){ return filter === 'done' ? r.status === 'done' : r.status !== 'done'; });
  list.innerHTML = filtered.map(function(r) {
    return '<div class="report-card" onclick="location.href=\'coach.html?id=' + r.id + '\'">' +
      '<div class="report-info"><div class="student">' + esc(r.student_name||'Unnamed') + '</div>' +
      '<div class="meta"><span>' + (r.session_date||'-') + '</span><span>' + (r.duration||60) + 'min</span><span>' + (r.goal||'-') + '</span></div></div>' +
      '<span class="report-badge ' + (r.status==='done'?'badge-done':'badge-pending') + '">' + (r.status==='done'?'Sent':'Pending') + '</span></div>';
  }).join('');
}

function showTab(filter) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  event.target.classList.add('active');
  loadReports(filter);
}

loadReports('all');
</script>
</body>
</html>
