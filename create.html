<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创建/编辑训练报告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 24px; }
  .page-title h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .form-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .form-section { margin-bottom: 28px; }
  .form-section:last-child { margin-bottom: 0; }
  .section-label { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #555; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border: 1.5px solid #e8eaf0; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group textarea:focus { border-color: #4f46e5; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .exercise-item { background: #f8f9fc; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .exercise-header span { font-size: 13px; font-weight: 600; color: #4f46e5; }
  .remove-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 18px; }
  .exercise-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .exercise-row input { padding: 8px 10px; border: 1.5px solid #e8eaf0; border-radius: 8px; font-size: 13px; }
  .add-exercise-btn { width: 100%; padding: 10px; border: 2px dashed #e8eaf0; border-radius: 10px; background: none; color: #888; font-size: 14px; cursor: pointer; }
  .add-exercise-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn-save { flex: 1; padding: 14px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #4338ca; }
  .btn-cancel { padding: 14px 24px; background: #fff; color: #666; border: 1.5px solid #e8eaf0; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
  .loading { text-align: center; padding: 40px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">← 返回列表</div>
  <div class="page-title"><h1 id="page-title">📋 创建训练报告</h1></div>
  <div class="form-card">
    <div class="form-section">
      <div class="section-label">基本信息</div>
      <div class="form-row">
        <div class="form-group"><label>学员姓名</label><input type="text" id="student_name" placeholder="如：张三" required></div>
        <div class="form-group"><label>第几次课</label><input type="number" id="session_number" value="1" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>上课日期</label><input type="date" id="session_date"></div>
        <div class="form-group"><label>训练时长（分钟）</label><input type="number" id="duration" value="60" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>训练目标</label>
          <select id="goal">
            <option value="减脂">减脂</option>
            <option value="增肌">增肌</option>
            <option value="塑形">塑形</option>
            <option value="体能提升">体能提升</option>
            <option value="康复训练">康复训练</option>
          </select>
        </div>
        <div class="form-group"><label>训练地点</label><input type="text" id="location" placeholder="如：器械区" value="器械区"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-label">训练动作</div>
      <div id="exercise-list"></div>
      <button class="add-exercise-btn" onclick="addExercise()">+ 添加训练动作</button>
    </div>

    <div class="form-section">
      <div class="section-label">体测数据</div>
      <div class="form-row">
        <div class="form-group"><label>体重 (kg)</label><input type="number" id="weight" step="0.1" placeholder="如：74.8"></div>
        <div class="form-group"><label>体脂率 (%)</label><input type="number" id="bodyfat" step="0.1" placeholder="如：22.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>最大重量 (kg)</label><input type="number" id="max_weight" placeholder="如：80"></div>
        <div class="form-group"><label>有氧时长 (分钟)</label><input type="number" id="cardio_time" placeholder="如：20"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>动作评分 (1-10)</label><input type="number" id="action_score" min="1" max="10" placeholder="如：8"></div>
        <div class="form-group"><label>状态评分 (1-10)</label><input type="number" id="status_score" min="1" max="10" placeholder="如：9"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-label">教练评语</div>
      <div class="form-group" style="margin-bottom:12px"><label>亮点</label><textarea id="highlight" placeholder="今天表现很好的地方..."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>待提升</label><textarea id="improve" placeholder="需要加强的地方..."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>关键提示</label><textarea id="tip" placeholder="技术要点或注意事项..."></textarea></div>
      <div class="form-group"><label>营养建议</label><textarea id="nutrition" placeholder="课后营养补充建议..."></textarea></div>
    </div>

    <div class="form-section">
      <div class="section-label">下节计划</div>
      <div class="form-row">
        <div class="form-group"><label>下次日期</label><input type="date" id="next_date"></div>
        <div class="form-group"><label>下次重点</label><input type="text" id="next_focus" placeholder="如：腿部力量 + 有氧耐力"></div>
      </div>
      <div class="form-group"><label>教练留言</label><textarea id="coach_note" placeholder="给学员的鼓励话...">继续加油，你进步很快！按这个节奏下去，下次体测数据一定会更好看 💪</textarea></div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='index.html'">取消</button>
      <button class="btn-save" onclick="saveReport()">💾 保存报告</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';
const supabase = SUPABASE_URL !== '__SUPABASE_URL__' ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let editingId = null;
let exerciseCount = 0;

function getReportId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function addExercise(module = '力量', name = '', sets = '', weight = '') {
  const list = document.getElementById('exercise-list');
  const id = exerciseCount++;
  list.insertAdjacentHTML('beforeend', `
    <div class="exercise-item" id="ex-${id}">
      <div class="exercise-header">
        <span>动作 ${exerciseCount}</span>
        <button class="remove-btn" onclick="removeExercise(${id})">×</button>
      </div>
      <div class="exercise-row">
        <select class="ex-module"><option value="热身">热身</option><option value="力量" selected>力量</option><option value="有氧">有氧</option><option value="拉伸">拉伸</option><option value="核心">核心</option></select>
        <input type="text" class="ex-name" placeholder="动作名称" value="${name}">
        <input type="text" class="ex-sets" placeholder="组数/时长" value="${sets}">
        <input type="text" class="ex-weight" placeholder="重量" value="${weight}">
      </div>
    </div>
  `);
  if (module !== '力量') {
    document.querySelector(`#ex-${id} .ex-module`).value = module;
  }
}

function removeExercise(id) {
  document.getElementById(`ex-${id}`).remove();
}

function getExercises() {
  const items = document.querySelectorAll('.exercise-item');
  return Array.from(items).map(item => ({
    module: item.querySelector('.ex-module').value,
    name: item.querySelector('.ex-name').value,
    sets: item.querySelector('.ex-sets').value,
    weight: item.querySelector('.ex-weight').value
  }));
}

async function saveReport() {
  const studentName = document.getElementById('student_name').value.trim();
  if (!studentName) { alert('请输入学员姓名'); return; }
  if (!supabase) { alert('Supabase 未配置，无法保存'); return; }

  const report = {
    student_name: studentName,
    session_number: parseInt(document.getElementById('session_number').value) || 1,
    session_date: document.getElementById('session_date').value,
    duration: parseInt(document.getElementById('duration').value) || 60,
    goal: document.getElementById('goal').value,
    location: document.getElementById('location').value,
    coach_name: '教练',
    status: 'pending',
    report_data: {
      exercises: getExercises(),
      metrics: {
        weight: document.getElementById('weight').value,
        bodyfat: document.getElementById('bodyfat').value,
        max_weight: document.getElementById('max_weight').value,
        cardio_time: document.getElementById('cardio_time').value,
        action_score: document.getElementById('action_score').value,
        status_score: document.getElementById('status_score').value
      },
      comments: {
        highlight: document.getElementById('highlight').value,
        improve: document.getElementById('improve').value,
        tip: document.getElementById('tip').value,
        nutrition: document.getElementById('nutrition').value,
        coach_note: document.getElementById('coach_note').value
      },
      next_session: {
        date: document.getElementById('next_date').value,
        focus: document.getElementById('next_focus').value
      }
    }
  };

  let result;
  if (editingId) {
    result = await supabase.from('reports').update(report).eq('id', editingId);
  } else {
    result = await supabase.from('reports').insert([report]);
  }

  if (result.error) {
    alert('保存失败: ' + result.error.message);
  } else {
    alert(editingId ? '报告已更新！' : '报告已创建！');
    location.href = 'index.html';
  }
}

async function loadExistingReport(id) {
  const { data, error } = await supabase.from('reports').select('*').eq('id', id).single();
  if (error || !data) return;
  editingId = id;
  document.getElementById('page-title').textContent = '✏️ 编辑训练报告';
  document.getElementById('student_name').value = data.student_name || '';
  document.getElementById('session_number').value = data.session_number || 1;
  document.getElementById('session_date').value = data.session_date || '';
  document.getElementById('duration').value = data.duration || 60;
  document.getElementById('goal').value = data.goal || '减脂';
  document.getElementById('location').value = data.location || '器械区';
  const rd = data.report_data || {};
  const exs = rd.exercises || [];
  if (exs.length === 0) addExercise();
  else exs.forEach(ex => addExercise(ex.module, ex.name, ex.sets, ex.weight));
  const m = rd.metrics || {};
  ['weight','bodyfat','max_weight','cardio_time','action_score','status_score'].forEach(k => document.getElementById(k).value = m[k] || '');
  const c = rd.comments || {};
  ['highlight','improve','tip','nutrition','coach_note'].forEach(k => document.getElementById(k).value = c[k] || '');
  const ns = rd.next_session || {};
  document.getElementById('next_date').value = ns.date || '';
  document.getElementById('next_focus').value = ns.focus || '';
}

async function init() {
  const id = getReportId();
  if (id) {
    await loadExistingReport(id);
  } else {
    addExercise();
  }
  // set default date to today
  if (!document.getElementById('session_date').value) {
    document.getElementById('session_date').value = new Date().toISOString().split('T')[0];
  }
}
init();
</script>
</body>
</html>
