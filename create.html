<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .form-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .form-section { margin-bottom: 28px; }
  .section-label { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #555; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border: 1.5px solid #e8eaf0; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: #4f46e5; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .exercise-item { background: #f8f9fc; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .exercise-header span { font-size: 13px; font-weight: 600; color: #4f46e5; }
  .remove-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 18px; }
  .exercise-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .exercise-row input, .exercise-row select { padding: 8px 10px; border: 1.5px solid #e8eaf0; border-radius: 8px; font-size: 13px; }
  .add-exercise-btn { width: 100%; padding: 10px; border: 2px dashed #e8eaf0; border-radius: 10px; background: none; color: #888; font-size: 14px; cursor: pointer; }
  .add-exercise-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn-save { flex: 1; padding: 14px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #4338ca; }
  .btn-cancel { padding: 14px 24px; background: #fff; color: #666; border: 1.5px solid #e8eaf0; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">Back to List</div>
  <div class="page-title"><h1 id="page-title">+ Create Training Report</h1></div>
  <div class="form-card">
    <div class="form-section">
      <div class="section-label">Basic Info</div>
      <div class="form-row">
        <div class="form-group"><label>Student Name</label><input type="text" id="student_name" placeholder="e.g. Zhang San" required></div>
        <div class="form-group"><label>Session Number</label><input type="number" id="session_number" value="1" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Session Date</label><input type="date" id="session_date"></div>
        <div class="form-group"><label>Duration (min)</label><input type="number" id="duration" value="60" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Goal</label>
          <select id="goal"><option value="Fat Loss">Fat Loss</option><option value="Muscle Gain">Muscle Gain</option><option value="Shaping">Shaping</option><option value="Fitness">Fitness</option><option value="Rehab">Rehab</option></select>
        </div>
        <div class="form-group"><label>Location</label><input type="text" id="location" placeholder="e.g. Gym" value="Gym"></div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-label">Exercises</div>
      <div id="exercise-list"></div>
      <button class="add-exercise-btn" id="add-ex-btn">+ Add Exercise</button>
    </div>
    <div class="form-section">
      <div class="section-label">Metrics</div>
      <div class="form-row">
        <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" step="0.1" placeholder="e.g. 74.8"></div>
        <div class="form-group"><label>Body Fat (%)</label><input type="number" id="bodyfat" step="0.1" placeholder="e.g. 22.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Max Weight (kg)</label><input type="number" id="max_weight" placeholder="e.g. 80"></div>
        <div class="form-group"><label>Cardio Time (min)</label><input type="number" id="cardio_time" placeholder="e.g. 20"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Action Score (1-10)</label><input type="number" id="action_score" min="1" max="10" placeholder="e.g. 8"></div>
        <div class="form-group"><label>Status Score (1-10)</label><input type="number" id="status_score" min="1" max="10" placeholder="e.g. 9"></div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-label">Feedback</div>
      <div class="form-group" style="margin-bottom:12px"><label>Highlight</label><textarea id="highlight" placeholder="What went well today..."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>Improve</label><textarea id="improve" placeholder="What needs improvement..."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>Tip</label><textarea id="tip" placeholder="Key tips or notes..."></textarea></div>
      <div class="form-group"><label>Nutrition</label><textarea id="nutrition" placeholder="Nutrition advice..."></textarea></div>
    </div>
    <div class="form-section">
      <div class="section-label">Next Session</div>
      <div class="form-row">
        <div class="form-group"><label>Next Date</label><input type="date" id="next_date"></div>
        <div class="form-group"><label>Next Focus</label><input type="text" id="next_focus" placeholder="e.g. Chest + Cardio"></div>
      </div>
      <div class="form-group"><label>Coach Note</label><textarea id="coach_note" placeholder="Encouragement for the student...">Keep it up, you are making great progress!</textarea></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='index.html'">Cancel</button>
      <button class="btn-save" id="save-btn">Save Report</button>
    </div>
  </div>
</div>

<script>
var MASTER_KEY = '$2a$10$xtOHk9uH7fTP9zDGqQ5FhObZPimIVOe39.U7RjutviV5cNeytzgbi';
var BIN_ID = localStorage.getItem('kkfitness_bin_id');
var BIN_URL = 'https://api.jsonbin.io/v2/b/' + BIN_ID;

var editingId = null;
var exerciseCount = 0;

function getReportId() { return new URLSearchParams(window.location.search).get('id'); }

async function jsonbinFetch(method, path, body) {
  var opts = {
    method: method,
    headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(BIN_URL + path, opts);
  var text = await r.text();
  var data;
  try { data = JSON.parse(text); } catch(e) { data = text; }
  if (!r.ok) return { error: r.status, data: null };
  return { data: data };
}

async function getReports() {
  var result = await jsonbinFetch('GET', '');
  if (result.error) return [];
  return result.data && result.data.reports ? result.data.reports : [];
}

async function saveReports(reports) {
  var r = await fetch(BIN_URL, {
    method: 'PUT',
    headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ reports: reports })
  });
  return r.ok;
}

function addExercise(module, name, sets, weight) {
  module = module || 'Strength'; name = name || ''; sets = sets || ''; weight = weight || '';
  var id = exerciseCount++;
  var el = document.createElement('div');
  el.className = 'exercise-item';
  el.id = 'ex-' + id;
  el.innerHTML =
    '<div class="exercise-header"><span>Exercise ' + (id+1) + '</span><button class="remove-btn" onclick="removeExercise(' + id + ')">x</button></div>' +
    '<div class="exercise-row">' +
      '<select class="ex-module"><option value="Warm Up">Warm Up</option><option value="Strength" selected>Strength</option><option value="Cardio">Cardio</option><option value="Stretch">Stretch</option><option value="Core">Core</option></select>' +
      '<input type="text" class="ex-name" placeholder="Exercise name" value="">' +
      '<input type="text" class="ex-sets" placeholder="Sets/Time" value="">' +
      '<input type="text" class="ex-weight" placeholder="Weight" value="">' +
    '</div>';
  if (module !== 'Strength') el.querySelector('.ex-module').value = module;
  if (name) el.querySelector('.ex-name').value = name;
  if (sets) el.querySelector('.ex-sets').value = sets;
  if (weight) el.querySelector('.ex-weight').value = weight;
  document.getElementById('exercise-list').appendChild(el);
}

function removeExercise(id) {
  var el = document.getElementById('ex-' + id);
  if (el) el.parentNode.removeChild(el);
}

function getExercises() {
  var items = document.querySelectorAll('.exercise-item');
  var result = [];
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    result.push({
      module: item.querySelector('.ex-module').value,
      name: item.querySelector('.ex-name').value,
      sets: item.querySelector('.ex-sets').value,
      weight: item.querySelector('.ex-weight').value
    });
  }
  return result;
}

document.getElementById('add-ex-btn').addEventListener('click', function() { addExercise(); });

document.getElementById('save-btn').addEventListener('click', async function() {
  var studentName = document.getElementById('student_name').value.trim();
  if (!studentName) { alert('Please enter student name'); return; }

  var report = {
    id: editingId || Date.now(),
    student_name: studentName,
    session_number: parseInt(document.getElementById('session_number').value) || 1,
    session_date: document.getElementById('session_date').value,
    duration: parseInt(document.getElementById('duration').value) || 60,
    goal: document.getElementById('goal').value,
    location: document.getElementById('location').value,
    coach_name: 'Coach',
    status: 'pending',
    created_at: editingId ? undefined : Date.now(),
    report_data: {
      exercises: getExercises(),
      metrics: {
        weight: document.getElementById('weight').value,
        bodyfat: document.getElementById('bodyfat').value,
        max_weight: document.getElementById('max_weight').value,
        cardio_time: document.getElementById('cardio_time').value,
        action_score: document.getElementById('action_score').value,
        status_score: document.getElementById('status_score').value
      },
      comments: {
        highlight: document.getElementById('highlight').value,
        improve: document.getElementById('improve').value,
        tip: document.getElementById('tip').value,
        nutrition: document.getElementById('nutrition').value,
        coach_note: document.getElementById('coach_note').value
      },
      next_session: {
        date: document.getElementById('next_date').value,
        focus: document.getElementById('next_focus').value
      }
    }
  };

  var reports = await getReports();
  if (editingId) {
    var idx = reports.findIndex(function(r){ return r.id === editingId; });
    if (idx >= 0) reports[idx] = report;
  } else {
    reports.push(report);
  }

  var ok = await saveReports(reports);
  if (ok) location.href = 'index.html';
  else alert('Save failed');
});

async function loadExistingReport(id) {
  var reports = await getReports();
  var r = reports.find(function(r){ return r.id === id; });
  if (!r) return;
  editingId = id;
  document.getElementById('page-title').textContent = 'Edit Report';
  document.getElementById('student_name').value = r.student_name || '';
  document.getElementById('session_number').value = r.session_number || 1;
  document.getElementById('session_date').value = r.session_date || '';
  document.getElementById('duration').value = r.duration || 60;
  document.getElementById('goal').value = r.goal || 'Fat Loss';
  document.getElementById('location').value = r.location || 'Gym';
  var rd = r.report_data || {};
  var exs = rd.exercises || [];
  if (exs.length === 0) addExercise(); else exs.forEach(function(ex){ addExercise(ex.module, ex.name, ex.sets, ex.weight); });
  var m = rd.metrics || {};
  ['weight','bodyfat','max_weight','cardio_time','action_score','status_score'].forEach(function(k){ document.getElementById(k).value = m[k] || ''; });
  var c = rd.comments || {};
  ['highlight','improve','tip','nutrition','coach_note'].forEach(function(k){ document.getElementById(k).value = c[k] || ''; });
  var ns = rd.next_session || {};
  document.getElementById('next_date').value = ns.date || '';
  document.getElementById('next_focus').value = ns.focus || '';
}

async function init() {
  var id = getReportId();
  if (id) {
    await loadExistingReport(id);
  } else {
    addExercise();
  }
  if (!document.getElementById('session_date').value)
    document.getElementById('session_date').value = new Date().toISOString().split('T')[0];
}
init();
</script>
</body>
</html>
