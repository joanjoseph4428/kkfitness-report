<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍒涘缓/缂栬緫璁粌鎶ュ憡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 24px; }
  .page-title h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 20px; cursor: pointer; }
  .form-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .form-section { margin-bottom: 28px; }
  .form-section:last-child { margin-bottom: 0; }
  .section-label { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #555; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border: 1.5px solid #e8eaf0; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group textarea:focus { border-color: #4f46e5; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .exercise-item { background: #f8f9fc; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .exercise-header span { font-size: 13px; font-weight: 600; color: #4f46e5; }
  .remove-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 18px; }
  .exercise-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .exercise-row input, .exercise-row select { padding: 8px 10px; border: 1.5px solid #e8eaf0; border-radius: 8px; font-size: 13px; }
  .add-exercise-btn { width: 100%; padding: 10px; border: 2px dashed #e8eaf0; border-radius: 10px; background: none; color: #888; font-size: 14px; cursor: pointer; }
  .add-exercise-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn-save { flex: 1; padding: 14px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #4338ca; }
  .btn-cancel { padding: 14px 24px; background: #fff; color: #666; border: 1.5px solid #e8eaf0; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
</style>
</head>
<body>
<div class="container">
  <div class="back-btn" onclick="location.href='index.html'">鈫?杩斿洖鍒楄〃</div>
  <div class="page-title"><h1 id="page-title">馃搵 鍒涘缓璁粌鎶ュ憡</h1></div>
  <div class="form-card">
    <div class="form-section">
      <div class="section-label">鍩烘湰淇℃伅</div>
      <div class="form-row">
        <div class="form-group"><label>瀛﹀憳濮撳悕</label><input type="text" id="student_name" placeholder="濡傦細寮犱笁" required></div>
        <div class="form-group"><label>绗嚑娆¤</label><input type="number" id="session_number" value="1" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>涓婅鏃ユ湡</label><input type="date" id="session_date"></div>
        <div class="form-group"><label>璁粌鏃堕暱锛堝垎閽燂級</label><input type="number" id="duration" value="60" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>璁粌鐩爣</label>
          <select id="goal"><option value="鍑忚剛">鍑忚剛</option><option value="澧炶倢">澧炶倢</option><option value="濉戝舰">濉戝舰</option><option value="浣撹兘鎻愬崌">浣撹兘鎻愬崌</option><option value="搴峰璁粌">搴峰璁粌</option></select>
        </div>
        <div class="form-group"><label>璁粌鍦扮偣</label><input type="text" id="location" placeholder="濡傦細鍣ㄦ鍖? value="鍣ㄦ鍖?></div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-label">璁粌鍔ㄤ綔</div>
      <div id="exercise-list"></div>
      <button class="add-exercise-btn" id="add-ex-btn">+ 娣诲姞璁粌鍔ㄤ綔</button>
    </div>
    <div class="form-section">
      <div class="section-label">浣撴祴鏁版嵁</div>
      <div class="form-row">
        <div class="form-group"><label>浣撻噸 (kg)</label><input type="number" id="weight" step="0.1" placeholder="濡傦細74.8"></div>
        <div class="form-group"><label>浣撹剛鐜?(%)</label><input type="number" id="bodyfat" step="0.1" placeholder="濡傦細22.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>鏈€澶ч噸閲?(kg)</label><input type="number" id="max_weight" placeholder="濡傦細80"></div>
        <div class="form-group"><label>鏈夋哀鏃堕暱 (鍒嗛挓)</label><input type="number" id="cardio_time" placeholder="濡傦細20"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>鍔ㄤ綔璇勫垎 (1-10)</label><input type="number" id="action_score" min="1" max="10" placeholder="濡傦細8"></div>
        <div class="form-group"><label>鐘舵€佽瘎鍒?(1-10)</label><input type="number" id="status_score" min="1" max="10" placeholder="濡傦細9"></div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-label">鏁欑粌璇勮</div>
      <div class="form-group" style="margin-bottom:12px"><label>浜偣</label><textarea id="highlight" placeholder="浠婂ぉ琛ㄧ幇寰堝ソ鐨勫湴鏂?.."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>寰呮彁鍗?/label><textarea id="improve" placeholder="闇€瑕佸姞寮虹殑鍦版柟..."></textarea></div>
      <div class="form-group" style="margin-bottom:12px"><label>鍏抽敭鎻愮ず</label><textarea id="tip" placeholder="鎶€鏈鐐规垨娉ㄦ剰浜嬮」..."></textarea></div>
      <div class="form-group"><label>钀ュ吇寤鸿</label><textarea id="nutrition" placeholder="璇惧悗钀ュ吇琛ュ厖寤鸿..."></textarea></div>
    </div>
    <div class="form-section">
      <div class="section-label">涓嬭妭璁″垝</div>
      <div class="form-row">
        <div class="form-group"><label>涓嬫鏃ユ湡</label><input type="date" id="next_date"></div>
        <div class="form-group"><label>涓嬫閲嶇偣</label><input type="text" id="next_focus" placeholder="濡傦細鑵块儴鍔涢噺 + 鏈夋哀鑰愬姏"></div>
      </div>
      <div class="form-group"><label>鏁欑粌鐣欒█</label><textarea id="coach_note" placeholder="缁欏鍛樼殑榧撳姳璇?..">缁х画鍔犳补锛屼綘杩涙寰堝揩锛佹寜杩欎釜鑺傚涓嬪幓锛屼笅娆′綋娴嬫暟鎹竴瀹氫細鏇村ソ鐪?馃挭</textarea></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='index.html'">鍙栨秷</button>
      <button class="btn-save" id="save-btn">馃捑 淇濆瓨鎶ュ憡</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SB_URL = 'https://zpuewfjhcutvnewwkqjv.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwdWV3ZmpoY3V0dm5ld3drcWp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjM0NjAsImV4cCI6MjA5MDY5OTQ2MH0.vkVTXyEZY2HhHRemHZEUgSaHRb_Tc03QvuBtL_y1tgQ';
var sb = (SB_URL && SB_KEY && typeof createClient !== 'undefined') ? createClient(SB_URL, SB_KEY) : null;

var editingId = null;
var exerciseCount = 0;

function getReportId() { return new URLSearchParams(window.location.search).get('id'); }

function addExercise(module, name, sets, weight) {
  module = module || '鍔涢噺'; name = name || ''; sets = sets || ''; weight = weight || '';
  var id = exerciseCount++;
  var el = document.createElement('div');
  el.className = 'exercise-item';
  el.id = 'ex-' + id;
  el.innerHTML =
    '<div class="exercise-header"><span>鍔ㄤ綔 ' + exerciseCount + '</span><button class="remove-btn" onclick="removeExercise(' + id + ')">脳</button></div>' +
    '<div class="exercise-row">' +
      '<select class="ex-module"><option value="鐑韩">鐑韩</option><option value="鍔涢噺" selected>鍔涢噺</option><option value="鏈夋哀">鏈夋哀</option><option value="鎷変几">鎷変几</option><option value="鏍稿績">鏍稿績</option></select>' +
      '<input type="text" class="ex-name" placeholder="鍔ㄤ綔鍚嶇О" value="">' +
      '<input type="text" class="ex-sets" placeholder="缁勬暟/鏃堕暱" value="">' +
      '<input type="text" class="ex-weight" placeholder="閲嶉噺" value="">' +
    '</div>';
  if (module !== '鍔涢噺') el.querySelector('.ex-module').value = module;
  if (name) el.querySelector('.ex-name').value = name;
  if (sets) el.querySelector('.ex-sets').value = sets;
  if (weight) el.querySelector('.ex-weight').value = weight;
  document.getElementById('exercise-list').appendChild(el);
}

function removeExercise(id) {
  var el = document.getElementById('ex-' + id);
  if (el) el.parentNode.removeChild(el);
}

function getExercises() {
  var items = document.querySelectorAll('.exercise-item');
  var result = [];
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    result.push({
      module: item.querySelector('.ex-module').value,
      name: item.querySelector('.ex-name').value,
      sets: item.querySelector('.ex-sets').value,
      weight: item.querySelector('.ex-weight').value
    });
  }
  return result;
}

document.getElementById('add-ex-btn').addEventListener('click', function() { addExercise(); });

document.getElementById('save-btn').addEventListener('click', async function() {
  var studentName = document.getElementById('student_name').value.trim();
  if (!studentName) { alert('璇疯緭鍏ュ鍛樺鍚?); return; }
  if (!sb) { alert('Supabase 鏈厤缃紝鏃犳硶淇濆瓨'); return; }

  var report = {
    student_name: studentName,
    session_number: parseInt(document.getElementById('session_number').value) || 1,
    session_date: document.getElementById('session_date').value,
    duration: parseInt(document.getElementById('duration').value) || 60,
    goal: document.getElementById('goal').value,
    location: document.getElementById('location').value,
    coach_name: '鏁欑粌',
    status: 'pending',
    report_data: {
      exercises: getExercises(),
      metrics: {
        weight: document.getElementById('weight').value,
        bodyfat: document.getElementById('bodyfat').value,
        max_weight: document.getElementById('max_weight').value,
        cardio_time: document.getElementById('cardio_time').value,
        action_score: document.getElementById('action_score').value,
        status_score: document.getElementById('status_score').value
      },
      comments: {
        highlight: document.getElementById('highlight').value,
        improve: document.getElementById('improve').value,
        tip: document.getElementById('tip').value,
        nutrition: document.getElementById('nutrition').value,
        coach_note: document.getElementById('coach_note').value
      },
      next_session: {
        date: document.getElementById('next_date').value,
        focus: document.getElementById('next_focus').value
      }
    }
  };

  var result;
  if (editingId) {
    result = await sb.from('reports').update(report).eq('id', editingId);
  } else {
    result = await sb.from('reports').insert([report]);
  }

  if (result.error) {
    alert('淇濆瓨澶辫触: ' + result.error.message);
  } else {
    alert(editingId ? '鎶ュ憡宸叉洿鏂帮紒' : '鎶ュ憡宸插垱寤猴紒');
    location.href = 'index.html';
  }
});

async function loadExistingReport(id) {
  var result = await sb.from('reports').select('*').eq('id', id).single();
  if (result.error || !result.data) return;
  var data = result.data;
  editingId = id;
  document.getElementById('page-title').textContent = '鉁忥笍 缂栬緫璁粌鎶ュ憡';
  document.getElementById('student_name').value = data.student_name || '';
  document.getElementById('session_number').value = data.session_number || 1;
  document.getElementById('session_date').value = data.session_date || '';
  document.getElementById('duration').value = data.duration || 60;
  document.getElementById('goal').value = data.goal || '鍑忚剛';
  document.getElementById('location').value = data.location || '鍣ㄦ鍖?;
  var rd = data.report_data || {};
  var exs = rd.exercises || [];
  if (exs.length === 0) addExercise(); else exs.forEach(function(ex){ addExercise(ex.module, ex.name, ex.sets, ex.weight); });
  var m = rd.metrics || {};
  ['weight','bodyfat','max_weight','cardio_time','action_score','status_score'].forEach(function(k){ document.getElementById(k).value = m[k] || ''; });
  var c = rd.comments || {};
  ['highlight','improve','tip','nutrition','coach_note'].forEach(function(k){ document.getElementById(k).value = c[k] || ''; });
  var ns = rd.next_session || {};
  document.getElementById('next_date').value = ns.date || '';
  document.getElementById('next_focus').value = ns.focus || '';
}

async function init() {
  var id = getReportId();
  if (id) {
    await loadExistingReport(id);
  } else {
    addExercise();
  }
  if (!document.getElementById('session_date').value)
    document.getElementById('session_date').value = new Date().toISOString().split('T')[0];
}
init();
</script>
</body>
</html>
